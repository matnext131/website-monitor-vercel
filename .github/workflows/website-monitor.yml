name: Website Monitor Cron

on:
  schedule:
    # 毎時17分・47分に実行（30分間隔、UTC基準）。
    # 毎時0分付近は GitHub Actions のスケジュール実行が集中し
    # 遅延・取りこぼしが起きやすいため、時刻をずらしている
    - cron: '17,47 * * * *'
  # GitHubのActions画面から手動実行できるようにする
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call /api/cron on Vercel
        env:
          # Repository Secret の CRON_SECRET を使用（値はログに出力されない）
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::Repository Secret CRON_SECRET is not set" >&2
            exit 1
          fi
          curl "https://website-monitor-vercel.vercel.app/api/cron" \
            --fail-with-body \
            --silent \
            --show-error \
            --retry 2 \
            --max-time 60 \
            -H "Authorization: Bearer ${CRON_SECRET}"
